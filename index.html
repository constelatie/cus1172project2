<html>
    <head>
        <title>My To Do List</title>
        <meta name="viewport" content="width=device-width. initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- for the buttons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- FOR THE LIST -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- for text highlighting -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="./style.css" rel="stylesheet">
        <script src="./todoarrays.js"></script>
    </head>
    <body>
        <div align="center" class="tasks">
            <h1>What Do I Have to Do?</h1>
            <form id="addingtasks">
                <label for="task">What's the task?</label> <br>
                <input for="task" type="text" placeholder="Do my CUS1172 homework..." id="task" required> <br>
                <label for="priority">What's the priority?</label> <br>
                <select for="priority" id="task-priority"> 
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select> <br>
                <label>Is this status pending?</label><br>
                <label id="yes">Yes</label>
                <input type="radio" id="yes" class="start" name="pendingtask" value="yes" required/>
                <label id="no">No</label>
                <input type="radio" id="no" class="start" name="pendingtask" value="no" required/><br>
                <input type="submit" class="btn btn-light"/>
            </form>

            <ul id="tasklist" class="list-group-item list-group-item-dark"></ul> <br>
        </div>
    </body>
</html>
